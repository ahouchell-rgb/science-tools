<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genetics Vocabulary CFU — Year 8 Inheritance</title>
<style>
  :root {
    --navy: #1E2761;
    --navy-hover: #2a3580;
    --ink: #1A1A1A;
    --muted: #5C6370;
    --warm: #F8F4EC;
    --soft-blue: #EDF2FA;
    --accent: #B85042;
    --success: #2C5F2D;
    --success-bg: #E8F0E5;
    --grid: #CFD8E3;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Century Gothic', 'CenturyGothic', 'AppleGothic', 'URW Gothic', sans-serif;
    color: var(--ink);
    background: var(--warm);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--navy);
    color: white;
    padding: 18px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  header h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 0.5px;
    font-weight: bold;
  }

  .progress {
    font-size: 18px;
    background: rgba(255,255,255,0.15);
    padding: 8px 20px;
    border-radius: 24px;
    letter-spacing: 0.5px;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px 40px;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .category-badge {
    display: inline-block;
    background: var(--soft-blue);
    color: var(--navy);
    padding: 8px 22px;
    border-radius: 24px;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 24px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .card {
    background: white;
    border: 2px solid var(--grid);
    border-radius: 16px;
    padding: 48px 56px;
    width: 100%;
    max-width: 1200px;
    box-shadow: 0 6px 24px rgba(30,39,97,0.08);
  }

  .qtext {
    font-size: 30px;
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 28px 0;
  }

  .qtext strong { color: var(--navy); }

  .legend {
    text-align: center;
    color: var(--muted);
    font-size: 18px;
    margin: 16px 0 24px 0;
    font-style: italic;
  }

  .chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin: 32px 0;
    flex-wrap: wrap;
  }

  .allele {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 96px;
    height: 96px;
    border-radius: 14px;
    font-size: 56px;
    font-weight: bold;
    font-family: inherit;
  }

  .allele.dom {
    background: var(--navy);
    color: white;
  }

  .allele.rec {
    background: var(--soft-blue);
    color: var(--navy);
    border: 3px solid var(--navy);
  }

  .plus, .arrow {
    font-size: 40px;
    color: var(--muted);
    font-weight: bold;
  }

  .prompts {
    display: flex;
    justify-content: space-around;
    gap: 20px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 2px dashed var(--grid);
  }

  .prompts span {
    font-size: 24px;
    color: var(--navy);
    font-weight: bold;
  }

  .statement {
    background: var(--soft-blue);
    padding: 28px 36px;
    border-radius: 12px;
    font-size: 28px;
    color: var(--navy);
    margin: 28px 0;
    text-align: center;
    border-left: 6px solid var(--accent);
    font-style: italic;
  }

  .scenario {
    background: var(--warm);
    padding: 24px 32px;
    border-radius: 10px;
    font-size: 22px;
    color: var(--ink);
    margin: 24px 0;
    line-height: 1.6;
  }

  .scenario .name { color: var(--navy); font-weight: bold; }

  .reveal-area {
    margin-top: 32px;
  }

  .reveal-btn {
    background: var(--navy);
    color: white;
    border: none;
    padding: 16px 44px;
    font-size: 22px;
    font-family: inherit;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    display: block;
    margin: 0 auto;
    transition: background 0.15s;
  }

  .reveal-btn:hover { background: var(--navy-hover); }

  .reveal-btn.done {
    background: var(--success);
  }

  .answer-step {
    background: var(--success-bg);
    border-left: 6px solid var(--success);
    padding: 22px 28px;
    border-radius: 10px;
    margin-top: 18px;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 14px;
    font-weight: bold;
    color: var(--success);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
    display: block;
  }

  .step-value {
    font-size: 32px;
    color: var(--ink);
    font-weight: bold;
    line-height: 1.3;
  }

  .step-note {
    font-size: 18px;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }

  .answer-step.wide .step-value { font-size: 26px; }

  nav.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: white;
    border-top: 2px solid var(--grid);
  }

  .nav-btn {
    background: white;
    color: var(--navy);
    border: 2px solid var(--navy);
    padding: 12px 32px;
    font-size: 18px;
    font-family: inherit;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.15s;
  }

  .nav-btn:disabled {
    color: var(--muted);
    border-color: var(--grid);
    cursor: not-allowed;
    opacity: 0.5;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--soft-blue);
  }

  .key-hint {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.4px;
  }

  .key {
    background: var(--soft-blue);
    border: 1px solid var(--grid);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 13px;
    color: var(--navy);
    font-weight: bold;
  }

  .hidden { display: none; }

  /* Completion screen */
  .complete-screen {
    text-align: center;
    padding: 40px;
  }
  .complete-screen h2 {
    color: var(--success);
    font-size: 42px;
    margin: 0 0 16px 0;
  }
  .complete-screen p {
    font-size: 22px;
    color: var(--ink);
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <h1>Genetics Vocabulary — Check for Understanding</h1>
  <div class="progress" id="progressIndicator">Question 1 of 12</div>
</header>

<main>
  <div class="category-badge" id="categoryBadge">Reading the chain</div>
  <div class="card" id="card">
    <div id="questionContent"></div>
    <div class="reveal-area">
      <button class="reveal-btn" id="revealBtn">Reveal answer ▾</button>
      <div id="answerContent"></div>
    </div>
  </div>
</main>

<nav class="controls">
  <button class="nav-btn" id="prevBtn">← Previous</button>
  <div class="key-hint">
    <span class="key">Space</span> reveal &nbsp;·&nbsp;
    <span class="key">←</span> <span class="key">→</span> navigate
  </div>
  <button class="nav-btn" id="nextBtn">Next →</button>
</nav>

<script>
// ===== QUESTION DATA =====
const questions = [
  // --- Round 1: Forward chain ---
  {
    category: "Reading the chain",
    setup: `
      <p class="qtext">A pea plant inherits these two alleles. Walk through the chain.</p>
      <div class="chain">
        <span class="allele dom">T</span>
        <span class="plus">+</span>
        <span class="allele dom">T</span>
      </div>
      <p class="legend">T = tall (dominant) &nbsp;·&nbsp; t = short (recessive)</p>
      <div class="prompts">
        <span>Genotype?</span><span>Zygosity?</span><span>Phenotype?</span>
      </div>
    `,
    reveals: [
      { label: "Genotype", value: "TT" },
      { label: "Zygosity", value: "Homozygous", note: "Two of the same allele" },
      { label: "Phenotype", value: "Tall", note: "Dominant T is expressed" }
    ]
  },
  {
    category: "Reading the chain",
    setup: `
      <p class="qtext">Now one of each. Same three questions.</p>
      <div class="chain">
        <span class="allele dom">T</span>
        <span class="plus">+</span>
        <span class="allele rec">t</span>
      </div>
      <p class="legend">T = tall (dominant) &nbsp;·&nbsp; t = short (recessive)</p>
      <div class="prompts">
        <span>Genotype?</span><span>Zygosity?</span><span>Phenotype?</span>
      </div>
    `,
    reveals: [
      { label: "Genotype", value: "Tt", note: "By convention, the dominant allele is written first" },
      { label: "Zygosity", value: "Heterozygous", note: "Two different alleles" },
      { label: "Phenotype", value: "Tall", note: "One dominant T is enough — it masks the recessive t" }
    ]
  },
  {
    category: "Reading the chain",
    setup: `
      <p class="qtext">Last forward chain. Two recessive alleles this time.</p>
      <div class="chain">
        <span class="allele rec">t</span>
        <span class="plus">+</span>
        <span class="allele rec">t</span>
      </div>
      <p class="legend">T = tall (dominant) &nbsp;·&nbsp; t = short (recessive)</p>
      <div class="prompts">
        <span>Genotype?</span><span>Zygosity?</span><span>Phenotype?</span>
      </div>
    `,
    reveals: [
      { label: "Genotype", value: "tt" },
      { label: "Zygosity", value: "Homozygous", note: "Two of the same allele — both recessive" },
      { label: "Phenotype", value: "Short", note: "The recessive phenotype only shows when there is no dominant allele present" }
    ]
  },

  // --- Round 2: Vocab spot-the-error ---
  {
    category: "Spot the vocab error",
    setup: `
      <p class="qtext">Maya is filling in her homework:</p>
      <div class="statement">"My pea plant has a <strong>genotype</strong> of <em>tall</em>."</div>
      <p class="qtext">What's wrong with what she's written? What word should she have used?</p>
    `,
    reveals: [
      { label: "What's wrong", value: "'Tall' is the phenotype, not the genotype.", note: "Phenotype = the observable characteristic. Genotype = the combination of alleles (e.g. TT, Tt, or tt)." }
    ]
  },
  {
    category: "Spot the vocab error",
    setup: `
      <p class="qtext">Raj is now making the opposite mistake:</p>
      <div class="statement">"My eye colour <strong>phenotype</strong> is <em>Bb</em>."</div>
      <p class="qtext">What's wrong? What did he mix up?</p>
    `,
    reveals: [
      { label: "What's wrong", value: "Bb is his genotype, not his phenotype.", note: "His phenotype would be 'brown eyes' — the trait you can see. Bb is the combination of alleles he carries." }
    ]
  },

  // --- Round 3: Transfer ---
  {
    category: "Different trait — same logic",
    setup: `
      <p class="qtext">Now apply it to a different trait: widow's peak.</p>
      <div class="chain">
        <span class="allele dom">W</span>
        <span class="plus">+</span>
        <span class="allele rec">w</span>
      </div>
      <p class="legend">W = widow's peak (dominant) &nbsp;·&nbsp; w = straight hairline (recessive)</p>
      <div class="prompts">
        <span>Genotype?</span><span>Zygosity?</span><span>Phenotype?</span>
      </div>
    `,
    reveals: [
      { label: "Genotype", value: "Ww" },
      { label: "Zygosity", value: "Heterozygous", note: "Two different alleles" },
      { label: "Phenotype", value: "Widow's peak", note: "The dominant W is present, so it is expressed" }
    ]
  },

  // --- Round 4: Reverse ---
  {
    category: "Working backwards",
    setup: `
      <p class="qtext">Now work the other way. A pea plant is <strong>short</strong>.</p>
      <p class="qtext">What is its genotype? Is there more than one possibility?</p>
      <p class="legend">T = tall (dominant) &nbsp;·&nbsp; t = short (recessive)</p>
    `,
    reveals: [
      { label: "Genotype", value: "tt — only one possibility", note: "A recessive phenotype only shows when there is NO dominant allele. Any T would have made the plant tall. So both alleles must be t." }
    ]
  },
  {
    category: "Working backwards",
    setup: `
      <p class="qtext">A person has a <strong>widow's peak</strong>.</p>
      <p class="qtext">What is their genotype? Is there more than one possibility?</p>
      <p class="legend">W = widow's peak (dominant) &nbsp;·&nbsp; w = straight hairline (recessive)</p>
    `,
    reveals: [
      { label: "Genotype — two possibilities", value: "WW or Ww", note: "Either works! Both produce the dominant phenotype. Just by looking at someone with widow's peak, you cannot tell which one they are — this is why heterozygotes are sometimes called 'carriers' of the recessive allele." }
    ]
  },

  // --- Round 5: Spot the error / reasoning ---
  {
    category: "True or false?",
    setup: `
      <p class="qtext">True or false — and explain your answer:</p>
      <div class="statement">"Bb is homozygous because it has B in it."</div>
    `,
    reveals: [
      { label: "Answer", value: "False — Bb is heterozygous.", note: "Homozygous means two of the SAME allele (BB or bb). Heterozygous means two DIFFERENT alleles. The uppercase/lowercase distinction matters — B and b are different alleles of the same gene." }
    ]
  },
  {
    category: "True or false?",
    setup: `
      <p class="qtext">True or false — and explain your reasoning:</p>
      <div class="statement">"Two tall pea plants cannot have a short offspring."</div>
    `,
    reveals: [
      { label: "Answer", value: "False — it absolutely can happen.", note: "If both parents are heterozygous (Tt), they each look tall but carry a recessive t. If their offspring inherits t from each parent, it will be tt — short. This is one of the most famous results in genetics (Mendel's pea plants)." }
    ]
  },

  // --- Round 6: Application ---
  {
    category: "Putting it together",
    setup: `
      <p class="qtext">Work this out as a class.</p>
      <div class="scenario">
        <p><span class="name">Maya</span> has a widow's peak (genotype <strong>Ww</strong>).</p>
        <p><span class="name">Maya's brother</span> has a straight hairline (genotype <strong>ww</strong>).</p>
        <p><span class="name">Their mum</span> has a straight hairline (genotype <strong>ww</strong>).</p>
        <p><strong>What is their dad's genotype?</strong> How do you know?</p>
      </div>
    `,
    reveals: [
      { label: "Dad's genotype", value: "Ww (heterozygous — widow's peak)", note: "Two clues: (1) Maya has a W, and she must have got it from Dad (Mum is ww so could only give w). So Dad has at least one W. (2) Maya's brother is ww, and one w came from Dad. So Dad also has a w. Therefore Dad is Ww." }
    ]
  },

  // --- Round 7: Trick recap ---
  {
    category: "Final challenge",
    setup: `
      <p class="qtext">On your whiteboards:</p>
      <div class="statement">"Write the genotype that is <strong>heterozygous</strong> AND produces the <strong>recessive</strong> phenotype."</div>
      <p class="qtext" style="text-align:center; color: var(--muted); font-size: 22px;">Think carefully before answering...</p>
    `,
    reveals: [
      { label: "Answer", value: "This is impossible — it's a trick question.", note: "Heterozygous means one dominant + one recessive allele. The dominant allele ALWAYS masks the recessive one when both are present. So a heterozygote always shows the DOMINANT phenotype. The recessive phenotype only appears in homozygous recessive individuals (e.g. tt, ww, bb). If anyone wrote 'Bb' or 'Tt' — they've confused the rule. Heterozygous = dominant phenotype, every time." }
    ]
  }
];

// ===== STATE & RENDER =====
let currentIdx = 0;
let revealedCount = 0;

const $card = document.getElementById('card');
const $qContent = document.getElementById('questionContent');
const $aContent = document.getElementById('answerContent');
const $revealBtn = document.getElementById('revealBtn');
const $category = document.getElementById('categoryBadge');
const $progress = document.getElementById('progressIndicator');
const $prevBtn = document.getElementById('prevBtn');
const $nextBtn = document.getElementById('nextBtn');

function render() {
  const q = questions[currentIdx];
  $category.textContent = q.category;
  $progress.textContent = `Question ${currentIdx + 1} of ${questions.length}`;
  $qContent.innerHTML = q.setup;
  $aContent.innerHTML = '';
  revealedCount = 0;
  updateRevealBtn();
  $prevBtn.disabled = currentIdx === 0;
  $nextBtn.disabled = currentIdx === questions.length - 1;
}

function updateRevealBtn() {
  const q = questions[currentIdx];
  if (revealedCount < q.reveals.length) {
    const total = q.reveals.length;
    if (total === 1) {
      $revealBtn.textContent = 'Reveal answer ▾';
    } else {
      $revealBtn.textContent = `Reveal step ${revealedCount + 1} of ${total} ▾`;
    }
    $revealBtn.classList.remove('done');
    $revealBtn.style.display = 'block';
  } else {
    $revealBtn.textContent = '✓ All revealed';
    $revealBtn.classList.add('done');
    $revealBtn.style.display = 'block';
  }
}

function revealNext() {
  const q = questions[currentIdx];
  if (revealedCount >= q.reveals.length) return;
  const step = q.reveals[revealedCount];
  const isWide = step.value.length > 30;
  const stepHTML = `
    <div class="answer-step${isWide ? ' wide' : ''}">
      <span class="step-label">${step.label}</span>
      <span class="step-value">${step.value}</span>
      ${step.note ? `<div class="step-note">${step.note}</div>` : ''}
    </div>
  `;
  $aContent.insertAdjacentHTML('beforeend', stepHTML);
  revealedCount++;
  updateRevealBtn();
}

function goNext() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    render();
  }
}

function goPrev() {
  if (currentIdx > 0) {
    currentIdx--;
    render();
  }
}

// ===== EVENT LISTENERS =====
$revealBtn.addEventListener('click', revealNext);
$nextBtn.addEventListener('click', goNext);
$prevBtn.addEventListener('click', goPrev);

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    revealNext();
  } else if (e.key === 'ArrowRight') {
    goNext();
  } else if (e.key === 'ArrowLeft') {
    goPrev();
  }
});

// ===== INIT =====
render();
</script>

</body>
</html>
