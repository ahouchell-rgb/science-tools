<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osmosis Required Practical — AQA Combined Science</title>
<style>
  :root{
    --navy:#0d2240; --navy-2:#16365c; --paper:#f5f8fc; --card:#ffffff;
    --line:#d3deee; --muted:#5a6c84; --accent:#0ea5a4; --gold:#e8a317;
    --correct:#1f9d57; --correct-bg:#e8f6ee; --wrong:#cf3b3b; --wrong-bg:#fbecec;
    --potato:#e7d3a0; --potato-edge:#c9ac6a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--paper);color:var(--navy);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;}

  header{background:var(--navy);color:#fff;padding:14px 28px;display:flex;align-items:center;
    justify-content:space-between;gap:20px;flex-wrap:wrap;}
  .brand{font-size:18px;font-weight:bold;letter-spacing:.3px;}
  .brand span{color:var(--gold);}
  .phases{display:flex;gap:8px;list-style:none;margin:0;padding:0;}
  .phases li{font-size:15px;font-weight:bold;padding:7px 16px;border-radius:999px;
    background:rgba(255,255,255,.10);color:rgba(255,255,255,.6);transition:.2s;white-space:nowrap;}
  .phases li.active{background:var(--accent);color:#fff;}
  .progress{height:4px;background:var(--navy-2);}
  .progress > div{height:100%;background:var(--gold);width:0;transition:width .35s ease;}

  main{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 28px;}
  .stage{width:100%;max-width:1120px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:0 10px 30px rgba(13,34,64,.07);padding:38px 46px;animation:rise .35s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .eyebrow{font-size:15px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin:0 0 10px;}
  h1{font-size:44px;line-height:1.08;margin:0 0 16px;}
  h2{font-size:32px;line-height:1.12;margin:0 0 14px;}
  .lead{font-size:22px;line-height:1.42;color:var(--navy-2);margin:0 0 20px;max-width:64ch;}
  ul.points{list-style:none;margin:0;padding:0;}
  ul.points li{font-size:21px;line-height:1.4;padding:11px 0 11px 36px;position:relative;border-bottom:1px solid var(--line);}
  ul.points li:last-child{border-bottom:none;}
  ul.points li::before{content:"";position:absolute;left:6px;top:19px;width:13px;height:13px;border-radius:50%;background:var(--accent);}
  .keyword{font-weight:bold;border-bottom:3px solid var(--gold);}
  .split{display:grid;grid-template-columns:1fr 1.05fr;gap:38px;align-items:center;}
  @media (max-width:900px){.split{grid-template-columns:1fr;gap:22px;}}

  .replay{font-family:inherit;font-size:16px;font-weight:bold;color:var(--accent);background:#eafafa;
    border:2px solid var(--accent);border-radius:10px;padding:9px 18px;cursor:pointer;margin-top:14px;}
  .replay:hover{background:#d7f5f4;}
  .caption{font-size:15px;color:var(--muted);font-style:italic;margin-top:10px;}

  /* animation canvas */
  .canvas{display:flex;justify-content:center;align-items:flex-end;min-height:300px;}

  /* CUT */
  .cut-wrap{position:relative;width:440px;height:300px;}
  .knife{animation:cutdrop 1.5s ease both;}
  @keyframes cutdrop{0%{transform:translateY(-70px);opacity:0;}35%{opacity:1;}60%{transform:translateY(0);}100%{transform:translateY(0);}}
  .chip-pop{opacity:0;animation:pop .45s ease forwards;}
  @keyframes pop{0%{opacity:0;transform:scale(.5);}100%{opacity:1;transform:scale(1);}}

  /* OSMOSIS row */
  .osmo-row{display:flex;gap:14px;justify-content:center;align-items:flex-end;flex-wrap:wrap;}
  .osmo-cell{width:120px;text-align:center;}
  .osmo-cell svg{width:100px;height:150px;}
  .osmo-chip{transform-box:fill-box;transform-origin:center bottom;transition:transform 2200ms cubic-bezier(.4,0,.2,1);}
  .mass{font-size:19px;font-weight:bold;margin-top:6px;}
  .badge{display:inline-block;margin-top:6px;font-size:15px;font-weight:bold;padding:3px 10px;border-radius:8px;opacity:0;transition:opacity .4s;}
  .badge.show{opacity:1;}
  .badge.up{background:var(--correct-bg);color:var(--correct);}
  .badge.down{background:var(--wrong-bg);color:var(--wrong);}
  .badge.flat{background:#eef2f7;color:var(--muted);}
  .conc{font-size:14px;color:var(--muted);margin-top:4px;}
  .drop-chip{transform:translateY(-115px);opacity:0;transition:transform .7s cubic-bezier(.2,.8,.2,1),opacity .5s;}

  /* formula */
  .formula{font-size:26px;text-align:center;background:var(--paper);border:1px dashed var(--accent);
    border-radius:14px;padding:22px;margin:6px 0;line-height:1.55;}
  .formula b{color:var(--accent);}
  .worked{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;}
  .worked .w{flex:1;min-width:230px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;font-size:19px;line-height:1.5;}
  .worked .w b{color:var(--navy);}
  .bignum{font-size:30px;font-weight:bold;}
  .bignum.up{color:var(--correct);} .bignum.down{color:var(--wrong);}

  /* graph */
  .gline{stroke-dasharray:620;stroke-dashoffset:620;transition:stroke-dashoffset 1.4s ease .8s;}
  .gpt{opacity:0;transition:opacity .35s;}
  .gcross{opacity:0;transition:opacity .5s 2.2s;}

  /* MCQ */
  .qtag{font-size:15px;font-weight:bold;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:0 0 8px;}
  .stem{font-size:28px;line-height:1.25;margin:0 0 24px;font-weight:bold;}
  .options{display:grid;gap:13px;}
  .opt{text-align:left;font-family:inherit;font-size:21px;line-height:1.3;padding:17px 21px;border-radius:12px;
    cursor:pointer;background:var(--paper);border:2px solid var(--line);color:var(--navy);
    display:flex;gap:15px;align-items:flex-start;transition:border-color .15s,background .15s;}
  .opt:hover:not(:disabled){border-color:var(--accent);}
  .opt:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .opt .letter{flex:0 0 auto;width:33px;height:33px;border-radius:8px;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:17px;}
  .opt.correct{background:var(--correct-bg);border-color:var(--correct);}
  .opt.correct .letter{background:var(--correct);}
  .opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);}
  .opt.wrong .letter{background:var(--wrong);}
  .opt:disabled{cursor:default;}
  .feedback{margin-top:20px;font-size:20px;line-height:1.45;padding:17px 21px;border-radius:12px;display:none;}
  .feedback.show{display:block;}
  .feedback.ok{background:var(--correct-bg);border-left:6px solid var(--correct);}
  .feedback.no{background:var(--wrong-bg);border-left:6px solid var(--wrong);}
  .feedback b{display:block;margin-bottom:4px;}

  /* ORDERING */
  .ord-prompt{font-size:24px;font-weight:bold;line-height:1.3;margin:0 0 6px;}
  .ord-sub{font-size:17px;color:var(--muted);margin:0 0 18px;}
  .pool{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;min-height:140px;padding:14px;
    background:var(--paper);border:2px dashed var(--line);border-radius:14px;}
  .ocard{font-family:inherit;cursor:pointer;background:#fff;border:2px solid var(--line);border-radius:12px;
    padding:12px;width:150px;text-align:center;transition:border-color .15s,transform .12s;}
  .ocard:hover{border-color:var(--accent);transform:translateY(-3px);}
  .ocard:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .ocard svg{width:70px;height:84px;display:block;margin:0 auto 8px;}
  .ocard .lab{font-size:15px;line-height:1.25;font-weight:bold;color:var(--navy);}
  .striplabel{display:flex;justify-content:space-between;font-size:15px;font-weight:bold;color:var(--muted);
    margin:22px 4px 8px;}
  .strip{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:130px;padding:14px;
    border-radius:14px;border:2px solid var(--accent);background:#fbfeff;align-items:center;}
  .strip .empty{color:var(--muted);font-size:17px;}
  .slot{position:relative;background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 10px 12px;width:128px;text-align:center;}
  .slot svg{width:56px;height:66px;display:block;margin:0 auto 6px;}
  .slot .lab{font-size:13px;line-height:1.2;font-weight:bold;}
  .slot .pos{position:absolute;top:-12px;left:-12px;width:28px;height:28px;border-radius:50%;background:var(--navy);
    color:#fff;font-weight:bold;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .slot.right{border-color:var(--correct);background:var(--correct-bg);} .slot.right .pos{background:var(--correct);}
  .slot.wrong{border-color:var(--wrong);background:var(--wrong-bg);} .slot.wrong .pos{background:var(--wrong);}
  .ord-controls{display:flex;gap:12px;justify-content:center;margin-top:18px;}
  .ord-fb{margin-top:16px;font-size:20px;text-align:center;font-weight:bold;min-height:26px;}
  .ord-fb.ok{color:var(--correct);} .ord-fb.no{color:var(--wrong);}

  /* six marker */
  .qcard{background:var(--navy);color:#fff;border-radius:14px;padding:26px 30px;margin:0 0 22px;}
  .qcard .marks{float:right;background:var(--gold);color:var(--navy);font-weight:bold;padding:6px 14px;border-radius:8px;font-size:18px;}
  .qcard p{font-size:23px;line-height:1.4;margin:0;}
  textarea{width:100%;min-height:140px;font-family:inherit;font-size:18px;line-height:1.5;padding:15px;
    border:2px solid var(--line);border-radius:12px;resize:vertical;color:var(--navy);}
  textarea:focus-visible{outline:3px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .ms{display:none;margin-top:24px;} .ms.show{display:block;animation:rise .3s ease;}
  .ms-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media (max-width:900px){.ms-grid{grid-template-columns:1fr;}}
  .ms-col h3{font-size:19px;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid var(--gold);}
  .check{display:flex;gap:11px;align-items:flex-start;font-size:17px;line-height:1.35;padding:9px 0;cursor:pointer;}
  .check input{width:21px;height:21px;margin-top:2px;flex:0 0 auto;accent-color:var(--accent);cursor:pointer;}
  .bands{margin-top:22px;display:grid;gap:9px;}
  .band{display:flex;gap:13px;align-items:flex-start;padding:13px 17px;border-radius:10px;background:var(--paper);
    border:1px solid var(--line);font-size:17px;line-height:1.35;}
  .band .lvl{flex:0 0 auto;font-weight:bold;color:#fff;background:var(--navy-2);padding:4px 12px;border-radius:8px;min-width:116px;text-align:center;}
  .band.lit{border-color:var(--accent);background:#eafafa;} .band.lit .lvl{background:var(--accent);}
  .verdict{margin-top:20px;font-size:21px;font-weight:bold;text-align:center;padding:17px;border-radius:12px;background:var(--navy);color:#fff;}
  .verdict span{color:var(--gold);}

  .end-grid{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;}
  .end-grid .pill{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:15px 19px;font-size:18px;flex:1;min-width:200px;}
  .end-grid .pill b{display:block;color:var(--accent);margin-bottom:4px;}

  footer{background:#fff;border-top:1px solid var(--line);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .navbtn{font-family:inherit;font-size:18px;font-weight:bold;padding:13px 28px;border-radius:12px;cursor:pointer;border:2px solid var(--navy);}
  .navbtn.back{background:#fff;color:var(--navy);} .navbtn.back:hover{background:var(--paper);}
  .navbtn.next{background:var(--navy);color:#fff;} .navbtn.next:hover{background:var(--navy-2);}
  .navbtn.ghost{background:#fff;color:var(--navy);border-color:var(--line);}
  .navbtn:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .navbtn:disabled{opacity:.35;cursor:not-allowed;}
  .hint{font-size:14px;color:var(--muted);text-align:center;flex:1;}
  .counter{font-size:15px;color:var(--muted);font-weight:bold;}

  @media (prefers-reduced-motion:reduce){
    .stage,.chip-pop,.knife{animation:none!important;}
    .osmo-chip,.drop-chip,.gline,.gpt,.gcross{transition:none!important;}
    .chip-pop{opacity:1!important;}.drop-chip{opacity:1!important;transform:none!important;}
    .gline{stroke-dashoffset:0!important;}.gpt,.gcross{opacity:1!important;}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">interactive&#8209;science.com &nbsp;<span>// Osmosis Practical</span></div>
    <ul class="phases">
      <li data-phase="method">1 &middot; Method</li>
      <li data-phase="check">2 &middot; Check</li>
      <li data-phase="exam">3 &middot; Exam</li>
    </ul>
  </header>
  <div class="progress"><div id="bar"></div></div>
  <main><div class="stage" id="stage"></div></main>
  <footer>
    <button class="navbtn back" id="back">&larr; Back</button>
    <div class="hint">Press <b>Space</b> or <b>&rarr;</b> to advance &middot; <b>&larr;</b> to go back</div>
    <div style="display:flex;align-items:center;gap:18px;">
      <span class="counter" id="counter"></span>
      <button class="navbtn next" id="next">Next &rarr;</button>
    </div>
  </footer>

<script>
/* ============ DATA ============ */
/* Continuous dataset used by the osmosis demo, the % screen and the graph */
const DEMO = [
  {conc:"0.0", init:5.00, fin:5.55, pct:+11, f:1.176},
  {conc:"0.2", init:5.00, fin:5.30, pct:+6,  f:1.096},
  {conc:"0.4", init:5.00, fin:5.00, pct:0,   f:1.000},
  {conc:"0.6", init:5.00, fin:4.75, pct:-5,  f:0.920},
  {conc:"0.8", init:5.00, fin:4.55, pct:-9,  f:0.856},
  {conc:"1.0", init:5.00, fin:4.35, pct:-13, f:0.792}
];

/* ============ SVG bits ============ */
function chipRect(cls,extra){extra=extra||"";return `<rect class="${cls}" x="-11" y="-26" width="22" height="52" rx="7" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2.5" ${extra}/>`;}

function osmoCell(d,i){
  // beaker with a chip that will be scaled by JS; chip sits on the base
  return `<div class="osmo-cell">
    <svg viewBox="0 0 100 150" role="img" aria-label="Beaker with potato cylinder, ${d.conc} mol per dm cubed">
      <path d="M18 24 L18 120 Q18 134 32 134 L68 134 Q82 134 82 120 L82 24" fill="none" stroke="#3a4a63" stroke-width="3"/>
      <path d="M21 70 L21 120 Q21 131 32 131 L68 131 Q79 131 79 120 L79 70 Z" fill="rgba(40,130,200,${(0.16+i*0.10).toFixed(2)})"/>
      <line x1="14" y1="24" x2="86" y2="24" stroke="#3a4a63" stroke-width="3" stroke-linecap="round"/>
      <g transform="translate(50,118)">${chipRect("osmo-chip","data-f='"+d.f+"'")}</g>
    </svg>
    <div class="mass" data-init="${d.init}" data-fin="${d.fin}">${d.init.toFixed(2)} g</div>
    <div class="badge ${d.pct>0?'up':d.pct<0?'down':'flat'}">${d.pct>0?'+':''}${d.pct}%</div>
    <div class="conc">${d.conc} mol/dm³</div>
  </div>`;
}

const IC = {
  cut:`<svg viewBox="0 0 70 84"><ellipse cx="20" cy="30" rx="17" ry="12" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2"/><rect x="40" y="14" width="8" height="30" rx="3" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2"/><rect x="52" y="14" width="8" height="30" rx="3" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2"/></svg>`,
  place:`<svg viewBox="0 0 70 84"><path d="M16 18 L16 60 Q16 70 26 70 L44 70 Q54 70 54 60 L54 18" fill="none" stroke="#3a4a63" stroke-width="2.5"/><path d="M18 40 L18 60 Q18 67 26 67 L44 67 Q52 67 52 60 L52 40 Z" fill="rgba(40,130,200,.4)"/><rect x="30" y="30" width="10" height="26" rx="4" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2"/></svg>`,
  wait:`<svg viewBox="0 0 70 84"><circle cx="35" cy="42" r="24" fill="#fff" stroke="#16365c" stroke-width="3"/><line x1="35" y1="42" x2="35" y2="26" stroke="#0d2240" stroke-width="3" stroke-linecap="round"/><line x1="35" y1="42" x2="47" y2="42" stroke="#0ea5a4" stroke-width="3" stroke-linecap="round"/></svg>`,
  blot:`<svg viewBox="0 0 70 84"><rect x="10" y="36" width="34" height="12" rx="2" fill="#eef2f7" stroke="#c2cee0" stroke-width="2"/><rect x="22" y="22" width="10" height="20" rx="4" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2"/><rect x="40" y="54" width="24" height="6" rx="2" fill="#16365c"/><rect x="46" y="40" width="12" height="14" rx="2" fill="#fff" stroke="#16365c" stroke-width="2"/></svg>`,
  calc:`<svg viewBox="0 0 70 84"><line x1="14" y1="14" x2="14" y2="64" stroke="#0d2240" stroke-width="2.5"/><line x1="14" y1="40" x2="60" y2="40" stroke="#0d2240" stroke-width="2.5"/><polyline points="16,24 30,32 44,40 58,54" fill="none" stroke="#0ea5a4" stroke-width="3"/><circle cx="44" cy="40" r="4" fill="#e8a317"/></svg>`
};
/* size-ordering chips at various final sizes */
function sizeChip(f){const h=52*f, y=-(h/2);return `<svg viewBox="0 0 70 84"><line x1="6" y1="74" x2="64" y2="74" stroke="#c2cee0" stroke-width="3"/><g transform="translate(35,74)"><rect x="-11" y="${(-h).toFixed(1)}" width="22" height="${h.toFixed(1)}" rx="7" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="2.5"/></g></svg>`;}

/* ============ ORDERING configs ============ */
const ORDER_METHOD = {
  prompt:"Put the method in the right order.",
  sub:"Click the steps in the order you'd do them. Then press Check.",
  leftLabel:"First", rightLabel:"Last",
  cards:[ /* shown scrambled */
    {id:"calc", lab:"Calculate % change &amp; plot graph", svg:IC.calc},
    {id:"cut",  lab:"Cut equal cylinders &amp; weigh",     svg:IC.cut},
    {id:"blot", lab:"Blot dry &amp; reweigh",              svg:IC.blot},
    {id:"place",lab:"Place in different concentrations",   svg:IC.place},
    {id:"wait", lab:"Leave for a set time",                svg:IC.wait}
  ],
  correct:["cut","place","wait","blot","calc"]
};
const SZ=[1.176,1.096,1.0,0.92,0.856];
const ORDER_SIZE = {
  prompt:"After the experiment, the cylinders looked like this.",
  sub:"Order them from the most dilute solution to the most concentrated. (Hint: which way did water move?)",
  leftLabel:"Most dilute", rightLabel:"Most concentrated",
  cards:[ /* scrambled by size */
    {id:"c", lab:"", svg:sizeChip(SZ[2])},
    {id:"e", lab:"", svg:sizeChip(SZ[4])},
    {id:"a", lab:"", svg:sizeChip(SZ[0])},
    {id:"d", lab:"", svg:sizeChip(SZ[3])},
    {id:"b", lab:"", svg:sizeChip(SZ[1])}
  ],
  correct:["a","b","c","d","e"] /* biggest (most dilute) -> smallest */
};

/* ============ MCQs ============ */
const MCQS = [
  {tag:"What moves?",
   stem:"During the experiment, what actually moves across the cell membranes?",
   opts:[{t:"The sugar molecules move into the potato"},
         {t:"Water molecules move across the membrane",c:true},
         {t:"Whole cells move between potato and solution"},
         {t:"Nothing moves — the potato just dries out"}],
   why:"Osmosis is the movement of <b>water</b>. Sugar molecules are too large to pass through the partially permeable membrane — only water does."},
  {tag:"Water in → gain",
   stem:"The cylinder in pure water gained mass. Why?",
   opts:[{t:"Sugar moved into the potato"},
         {t:"Water moved into the cells by osmosis",c:true},
         {t:"The cells grew and divided"},
         {t:"Water evaporated into the potato"}],
   why:"The solution outside is more dilute than the cell contents, so water moves <b>into</b> the cells through the membrane — mass increases."},
  {tag:"Water out → loss",
   stem:"The cylinder in concentrated sugar solution lost mass. Why?",
   opts:[{t:"The sugar pushed the water out"},
         {t:"The potato dissolved"},
         {t:"Water moved out of the cells, into the concentrated solution",c:true},
         {t:"Water moved in and burst the cells"}],
   why:"Now the outside is more concentrated than the cell contents, so water moves <b>out</b> of the cells — mass decreases."},
  {tag:"Reading the graph",
   stem:"On the graph, the line crosses zero at 0.4 mol/dm³. What does this mean?",
   opts:[{t:"Osmosis has completely stopped"},
         {t:"The concentration inside the cells is about 0.4 mol/dm³ — no net movement",c:true},
         {t:"The cells have died"},
         {t:"The sugar has run out"}],
   why:"No change in mass means water moved in and out at equal rates — no <b>net</b> movement. That happens when the outside matches the inside of the cells."}
];

const MS_METHOD = [
  "Cut several potato cylinders of equal size; measure and record the initial mass of each.",
  "Place cylinders in a range of known sugar concentrations (e.g. 0.0–1.0 mol/dm³).",
  "Control variables: same volume of solution, same temperature, same length of time.",
  "Remove, blot dry, reweigh, and calculate the percentage change in mass.",
  "Plot % change against concentration; the concentration where % change = 0 equals the concentration inside the cells."
];
const MS_EXPLAIN = [
  "Water moves by osmosis across the partially permeable cell membrane.",
  "In dilute solutions, water moves into the cells, so the mass increases.",
  "In concentrated solutions, water moves out of the cells, so the mass decreases.",
  "When there is no net movement, the outside concentration equals the cell contents — this is the answer."
];

/* ============ screens ============ */
const screens = [];
screens.push({type:"cover"});
screens.push({type:"cut"});
screens.push({type:"place"});
screens.push({type:"osmosis"});
screens.push({type:"percent"});
screens.push({type:"graph"});
screens.push({type:"checkIntro"});
screens.push({type:"order",cfg:ORDER_METHOD,key:"om"});
screens.push({type:"order",cfg:ORDER_SIZE,key:"os"});
MCQS.forEach((q,i)=>screens.push({type:"mcq",data:q,qi:i}));
screens.push({type:"examIntro"});
screens.push({type:"sixmark"});
screens.push({type:"end"});
const TOTAL=screens.length;
function phaseOf(i){const t=screens[i].type;
  if(["cover","cut","place","osmosis","percent","graph"].includes(t))return"method";
  if(["checkIntro","order","mcq"].includes(t))return"check";return"exam";}

/* ============ state ============ */
let idx=0;
const mcqState={};
const ordState={om:{placed:[],checked:false}, os:{placed:[],checked:false}};
const sixState={text:"",checks:{}};

/* ============ DOM ============ */
const stage=document.getElementById("stage"),bar=document.getElementById("bar"),
  counter=document.getElementById("counter"),backBtn=document.getElementById("back"),nextBtn=document.getElementById("next");

/* ============ render ============ */
function render(){
  const s=screens[idx];let html="";

  if(s.type==="cover"){
    html=`<p class="eyebrow">AQA Combined Science · Biology</p>
      <h1>Osmosis in potato tissue</h1>
      <p class="lead">Watch the practical happen, work out the science, then build a full 6-mark answer.</p>
      <div class="end-grid">
        <div class="pill"><b>Part 1 · Method</b>See the cylinders cut, placed, and change before your eyes.</div>
        <div class="pill"><b>Part 2 · Check</b>Order the steps, then reason about the results.</div>
        <div class="pill"><b>Part 3 · Exam</b>Describe and explain — the 6-marker.</div>
      </div>`;
  }

  else if(s.type==="cut"){
    html=`<p class="eyebrow">Method · step 1</p>
      <div class="split">
        <div><h2>Cut equal cylinders</h2>
          <p class="lead">Cut several potato cylinders the <span class="keyword">same size</span>, then measure and record the mass of each.</p>
          <ul class="points">
            <li>Same size = a fair test (control variable)</li>
            <li>Record the <span class="keyword">starting mass</span> of each one</li>
          </ul>
          <button class="replay" id="replay">↻ Replay</button>
        </div>
        <div class="canvas"><div class="cut-wrap">
          <svg viewBox="0 0 440 300" width="440" height="300">
            <ellipse cx="120" cy="160" rx="78" ry="50" fill="#e7d3a0" stroke="#c9ac6a" stroke-width="3"/>
            <g class="knife"><rect x="150" y="40" width="150" height="14" rx="4" fill="#9aa7b8"/><rect x="215" y="54" width="20" height="36" fill="#7d8a9c"/></g>
            <g transform="translate(290,180)">
              <g class="chip-pop" style="animation-delay:.9s">${chipRect("")}</g>
              <g class="chip-pop" style="animation-delay:1.1s" transform="translate(40,0)">${chipRect("")}</g>
              <g class="chip-pop" style="animation-delay:1.3s" transform="translate(80,0)">${chipRect("")}</g>
            </g>
            <text x="330" y="230" font-size="15" text-anchor="middle" font-family="Arial" fill="#0d2240" font-weight="bold">all the same size</text>
          </svg>
        </div></div>
      </div>`;
  }

  else if(s.type==="place"){
    html=`<p class="eyebrow">Method · step 2</p>
      <div class="split">
        <div><h2>Place in different concentrations</h2>
          <p class="lead">Drop one cylinder into each concentration of sugar solution — from pure water up to a strong solution.</p>
          <ul class="points">
            <li>Same <span class="keyword">volume</span> of solution in each</li>
            <li>Start them all together, same temperature</li>
            <li>Leave for a fixed time so osmosis can happen</li>
          </ul>
          <button class="replay" id="replay">↻ Replay</button>
        </div>
        <div class="canvas"><div class="osmo-row">${DEMO.map((d,i)=>osmoCellPlace(d,i)).join("")}</div></div>
      </div>`;
  }

  else if(s.type==="osmosis"){
    html=`<p class="eyebrow">Method · step 3 — the key moment</p>
      <h2>Osmosis changes the mass</h2>
      <p class="lead">Same starting mass, different solutions. Watch what happens — and watch the masses.</p>
      <div class="canvas"><div class="osmo-row">${DEMO.map((d,i)=>osmoCell(d,i)).join("")}</div></div>
      <p class="caption">Size change is exaggerated so you can see it from the back of the room — the <b>masses</b> show the real size of the effect.</p>
      <button class="replay" id="replay">↻ Replay</button>`;
  }

  else if(s.type==="percent"){
    html=`<p class="eyebrow">Method · step 4</p>
      <div>
        <h2>Calculate percentage change</h2>
        <p class="lead">The cylinders didn't all start at exactly the same mass, so we compare them fairly using <span class="keyword">percentage change</span>.</p>
        <div class="formula"><span style="font-size:20px;color:#5a6c84">% change in mass =</span><br>
          <b>(final mass − initial mass)</b> ÷ initial mass × 100</div>
        <div class="worked">
          <div class="w"><b>Pure water (0.0 mol/dm³)</b><br>(5.55 − 5.00) ÷ 5.00 × 100<br>
            <span class="bignum up" id="wA">= +11%</span><br><span style="font-size:16px;color:#5a6c84">gained water</span></div>
          <div class="w"><b>Strong solution (1.0 mol/dm³)</b><br>(4.35 − 5.00) ÷ 5.00 × 100<br>
            <span class="bignum down" id="wB">= −13%</span><br><span style="font-size:16px;color:#5a6c84">lost water</span></div>
        </div>
      </div>`;
  }

  else if(s.type==="graph"){
    html=`<p class="eyebrow">Method · step 5</p>
      <div class="split">
        <div><h2>Plot and read the graph</h2>
          <p class="lead">Plot % change against concentration. Where the line <span class="keyword">crosses zero</span>, the mass didn't change.</p>
          <ul class="points">
            <li>No change = no net movement of water</li>
            <li>There, the solution = the cell contents</li>
            <li>That concentration is the answer to the question</li>
          </ul>
          <button class="replay" id="replay">↻ Replay</button>
        </div>
        <div class="canvas">${graphSVG()}</div>
      </div>`;
  }

  else if(s.type==="checkIntro"){
    html=`<p class="eyebrow">Part 2 · Check for understanding</p>
      <h1>Now work it out</h1>
      <p class="lead">First, order the method. Then reason about the results. Then explain the <span class="keyword">why</span> — the thinking the exam question needs.</p>`;
  }

  else if(s.type==="order"){ html=orderHTML(s.cfg,ordState[s.key]); }

  else if(s.type==="mcq"){
    const q=s.data,st=mcqState[s.qi]||{chosen:null,answered:false},L=["A","B","C","D"];
    html=`<p class="qtag">Question ${s.qi+1} of ${MCQS.length} · ${q.tag}</p>
      <p class="stem">${q.stem}</p>
      <div class="options">${q.opts.map((o,i)=>{let c="opt";
        if(st.answered){if(o.c)c+=" correct";else if(st.chosen===i)c+=" wrong";}
        return `<button class="${c}" data-i="${i}" ${st.answered?"disabled":""}><span class="letter">${L[i]}</span><span>${o.t}</span></button>`;}).join("")}</div>
      <div class="feedback ${st.answered?(q.opts[st.chosen].c?"ok show":"no show"):""}">
        <b>${st.answered?(q.opts[st.chosen].c?"Correct":"Not quite"):""}</b>${q.why}</div>`;
  }

  else if(s.type==="examIntro"){
    html=`<p class="eyebrow">Part 3 · Exam question</p>
      <h1>Put it together</h1>
      <p class="lead">A strong 6-marker does <span class="keyword">two things</span>: describes a clear method <em>and</em> explains the osmosis behind it.</p>
      <div class="end-grid">
        <div class="pill"><b>Describe</b>The steps to get a valid result.</div>
        <div class="pill"><b>Explain</b>Why water moves, and why mass changes.</div>
      </div>
      <p class="lead" style="font-size:19px;color:var(--muted);margin-top:18px">Method only, or explanation only, caps the level. Top marks need both.</p>`;
  }

  else if(s.type==="sixmark"){
    const m=sixState.checks;
    html=`<div class="qcard"><span class="marks">6 marks</span>
        <p>A student wants to find the concentration of sugar solution that is the <b>same</b> as the inside of potato cells.<br><br>
        Describe a method she could use, <b>and</b> explain how osmosis causes the mass of the potato to change.</p></div>
      <textarea id="answer" placeholder="Write or plan your answer here…">${sixState.text}</textarea>
      <div style="margin-top:14px;text-align:right"><button class="navbtn next" id="reveal">Reveal mark scheme ↓</button></div>
      <div class="ms" id="ms">
        <div class="ms-grid">
          <div class="ms-col"><h3>Method (describe)</h3>
            ${MS_METHOD.map((p,i)=>`<label class="check"><input type="checkbox" data-strand="m" data-i="${i}" ${m["m"+i]?"checked":""}><span>${p}</span></label>`).join("")}</div>
          <div class="ms-col"><h3>Osmosis (explain)</h3>
            ${MS_EXPLAIN.map((p,i)=>`<label class="check"><input type="checkbox" data-strand="e" data-i="${i}" ${m["e"+i]?"checked":""}><span>${p}</span></label>`).join("")}</div>
        </div>
        <div class="bands">
          <div class="band" data-band="3"><span class="lvl">Level 3 · 5–6</span><span>Clear, coherent <b>method and explanation</b>; water movement linked to mass change both ways.</span></div>
          <div class="band" data-band="2"><span class="lvl">Level 2 · 3–4</span><span>A method <b>and</b> some explanation, with some linkage.</span></div>
          <div class="band" data-band="1"><span class="lvl">Level 1 · 1–2</span><span>Simple statements — method <b>or</b> explanation only.</span></div>
        </div>
        <div class="verdict" id="verdict">Tick what your answer included to see the likely level.</div>
      </div>`;
  }

  else if(s.type==="end"){
    html=`<p class="eyebrow">Done</p>
      <h1>Required practical complete</h1>
      <p class="lead">You watched it, ordered it, reasoned it, and built the answer.</p>
      <div class="end-grid">
        <div class="pill"><b>Remember</b>Water moves from dilute → concentrated through a partially permeable membrane.</div>
        <div class="pill"><b>The trick</b>% change makes different starting masses comparable.</div>
        <div class="pill"><b>The graph</b>Crosses zero = the concentration inside the cells.</div>
      </div>`;
  }

  stage.innerHTML=html;
  document.querySelectorAll(".phases li").forEach(li=>li.classList.toggle("active",li.dataset.phase===phaseOf(idx)));
  bar.style.width=(idx/(TOTAL-1)*100)+"%";
  counter.textContent=(idx+1)+" / "+TOTAL;
  backBtn.disabled=idx===0;nextBtn.disabled=idx===TOTAL-1;
  nextBtn.textContent=idx===TOTAL-2?"Finish →":"Next →";
  onShow(s);
}

/* place-screen cell: chip starts above, drops in */
function osmoCellPlace(d,i){
  return `<div class="osmo-cell">
    <svg viewBox="0 0 100 150">
      <path d="M18 24 L18 120 Q18 134 32 134 L68 134 Q82 134 82 120 L82 24" fill="none" stroke="#3a4a63" stroke-width="3"/>
      <path d="M21 70 L21 120 Q21 131 32 131 L68 131 Q79 131 79 120 L79 70 Z" fill="rgba(40,130,200,${(0.16+i*0.10).toFixed(2)})"/>
      <line x1="14" y1="24" x2="86" y2="24" stroke="#3a4a63" stroke-width="3" stroke-linecap="round"/>
      <g class="drop-chip" style="transition-delay:${i*150}ms"><g transform="translate(50,118)">${chipRect("")}</g></g>
    </svg>
    <div class="conc">${d.conc} mol/dm³</div>
  </div>`;
}

function graphSVG(){
  const P=[[90,70],[172,106],[254,150],[336,187],[418,216],[500,245]];
  const pts=P.map(p=>p.join(",")).join(" ");
  const circles=P.map((p,i)=>`<circle class="gpt" style="transition-delay:${0.15*i}s" cx="${p[0]}" cy="${p[1]}" r="6" fill="#0ea5a4"/>`).join("");
  return `<svg viewBox="0 0 560 300" width="540" height="300">
    <line x1="70" y1="40" x2="70" y2="250" stroke="#0d2240" stroke-width="3"/>
    <line x1="70" y1="150" x2="520" y2="150" stroke="#0d2240" stroke-width="3"/>
    <text x="42" y="150" font-size="13" text-anchor="middle" font-family="Arial" fill="#0d2240" transform="rotate(-90 42 150)">% change in mass</text>
    <text x="290" y="285" font-size="13" text-anchor="middle" font-family="Arial" fill="#0d2240">concentration (mol/dm³)</text>
    <text x="62" y="58" font-size="13" text-anchor="end" fill="#5a6c84">+</text>
    <text x="62" y="248" font-size="13" text-anchor="end" fill="#5a6c84">−</text>
    <polyline class="gline" points="${pts}" fill="none" stroke="#0ea5a4" stroke-width="4"/>
    ${circles}
    <g class="gcross"><circle cx="254" cy="150" r="8" fill="#e8a317" stroke="#0d2240" stroke-width="2"/>
      <line x1="254" y1="150" x2="254" y2="250" stroke="#e8a317" stroke-width="2" stroke-dasharray="5 5"/>
      <text x="254" y="270" font-size="14" text-anchor="middle" font-family="Arial" fill="#0d2240" font-weight="bold">≈ 0.4 mol/dm³</text></g>
  </svg>`;
}

/* ordering screen markup */
function orderHTML(cfg,st){
  const placedSet=new Set(st.placed);
  const pool=cfg.cards.filter(c=>!placedSet.has(c.id));
  const poolHtml=pool.length?pool.map(c=>`<button class="ocard" data-id="${c.id}">${c.svg}<span class="lab">${c.lab}</span></button>`).join("")
    :`<span class="empty">All placed — press Check.</span>`;
  const stripHtml=st.placed.length?st.placed.map((id,pos)=>{
      const c=cfg.cards.find(x=>x.id===id);let cls="slot";
      if(st.checked)cls+=(cfg.correct[pos]===id?" right":" wrong");
      return `<button class="${cls}" data-pos="${pos}"><span class="pos">${pos+1}</span>${c.svg}<span class="lab">${c.lab}</span></button>`;
    }).join("")
    :`<span class="empty">Click steps above, in order…</span>`;
  let fb="",fbc="";
  if(st.checked){
    const right=st.placed.filter((id,p)=>cfg.correct[p]===id).length;
    if(right===cfg.correct.length){fb="Correct order! ✓";fbc="ok";}
    else{fb=right+" of "+cfg.correct.length+" in the right place — tap a card to remove it, then try again.";fbc="no";}
  }
  return `<p class="eyebrow">${phaseOf(idx)==="check"?"Check":""} · ordering task</p>
    <p class="ord-prompt">${cfg.prompt}</p><p class="ord-sub">${cfg.sub}</p>
    <div class="pool" id="pool">${poolHtml}</div>
    <div class="striplabel"><span>${cfg.leftLabel} →</span><span>→ ${cfg.rightLabel}</span></div>
    <div class="strip" id="strip">${stripHtml}</div>
    <div class="ord-fb ${fbc}">${fb}</div>
    <div class="ord-controls">
      <button class="navbtn ghost" id="ordReset">Reset</button>
      <button class="navbtn next" id="ordCheck" ${st.placed.length<cfg.correct.length?"disabled":""}>Check</button>
    </div>`;
}

/* ============ onShow: animations + handlers ============ */
function onShow(s){
  const rep=stage.querySelector("#replay");
  if(rep)rep.addEventListener("click",()=>render());

  if(s.type==="place"){
    requestAnimationFrame(()=>stage.querySelectorAll(".drop-chip").forEach(g=>{g.style.transform="translateY(0)";g.style.opacity="1";}));
  }

  if(s.type==="osmosis"){
    const cells=stage.querySelectorAll(".osmo-cell");
    requestAnimationFrame(()=>{
      stage.querySelectorAll(".osmo-chip").forEach(ch=>{ch.style.transform="scale("+ch.getAttribute("data-f")+")";});
    });
    cells.forEach(cell=>{
      const ml=cell.querySelector(".mass");
      animateMass(ml,parseFloat(ml.dataset.init),parseFloat(ml.dataset.fin),2200);
    });
    setTimeout(()=>stage.querySelectorAll(".badge").forEach(b=>b.classList.add("show")),2100);
  }

  if(s.type==="percent"){
    const a=stage.querySelector("#wA"),b=stage.querySelector("#wB");
    a.style.opacity="0";b.style.opacity="0";
    setTimeout(()=>{a.style.transition="opacity .5s";a.style.opacity="1";},500);
    setTimeout(()=>{b.style.transition="opacity .5s";b.style.opacity="1";},1100);
  }

  if(s.type==="graph"){
    const line=stage.querySelector(".gline"),pts=stage.querySelectorAll(".gpt"),cross=stage.querySelector(".gcross");
    requestAnimationFrame(()=>{pts.forEach(p=>p.style.opacity="1");line.style.strokeDashoffset="0";cross.style.opacity="1";});
  }

  if(s.type==="mcq"){
    stage.querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click",()=>{
      if(mcqState[s.qi]&&mcqState[s.qi].answered)return;
      mcqState[s.qi]={chosen:parseInt(btn.dataset.i,10),answered:true};render();
    }));
  }

  if(s.type==="order"){
    const st=ordState[s.key],cfg=s.cfg;
    stage.querySelectorAll("#pool .ocard").forEach(b=>b.addEventListener("click",()=>{
      st.placed.push(b.dataset.id);st.checked=false;render();}));
    stage.querySelectorAll("#strip .slot").forEach(b=>b.addEventListener("click",()=>{
      st.placed.splice(parseInt(b.dataset.pos,10),1);st.checked=false;render();}));
    const rs=stage.querySelector("#ordReset");if(rs)rs.addEventListener("click",()=>{st.placed=[];st.checked=false;render();});
    const ck=stage.querySelector("#ordCheck");if(ck)ck.addEventListener("click",()=>{st.checked=true;render();});
  }

  if(s.type==="sixmark"){
    const ta=stage.querySelector("#answer");
    ta.addEventListener("input",()=>sixState.text=ta.value);
    stage.querySelector("#reveal").addEventListener("click",()=>{stage.querySelector("#ms").classList.add("show");gradeSix();});
    stage.querySelectorAll('.ms input[type="checkbox"]').forEach(cb=>cb.addEventListener("change",()=>{
      sixState.checks[cb.dataset.strand+cb.dataset.i]=cb.checked;gradeSix();}));
    if(Object.keys(sixState.checks).length){stage.querySelector("#ms").classList.add("show");gradeSix();}
  }
}

function animateMass(el,from,to,dur){
  const t0=performance.now();
  function step(t){
    let k=Math.min(1,(t-t0)/dur);k=1-Math.pow(1-k,3);
    el.textContent=(from+(to-from)*k).toFixed(2)+" g";
    if(k<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function gradeSix(){
  let mC=0,eC=0;
  Object.keys(sixState.checks).forEach(k=>{if(!sixState.checks[k])return;k[0]==="m"?mC++:eC++;});
  let band=0,marks="0";
  if(mC>=3&&eC>=3){band=3;marks="5–6";}
  else if(mC>=1&&eC>=1){band=2;marks="3–4";}
  else if(mC+eC>=1){band=1;marks="1–2";}
  document.querySelectorAll(".band").forEach(b=>b.classList.toggle("lit",parseInt(b.dataset.band,10)===band));
  const v=document.getElementById("verdict");if(!v)return;
  if(band===0)v.innerHTML="Tick what your answer included to see the likely level.";
  else if(band===3)v.innerHTML=`Both strands covered → <span>Level 3 (${marks} marks)</span>`;
  else if(band===2)v.innerHTML=`Method and explanation present → <span>Level 2 (${marks} marks)</span> — add detail and link them for Level 3.`;
  else{const miss=mC===0?"method":"explanation";v.innerHTML=`Only one strand → <span>Level 1 (${marks} marks)</span> — you're missing the <b>${miss}</b>.`;}
}

/* ============ nav ============ */
function go(d){const t=idx+d;if(t<0||t>TOTAL-1)return;idx=t;render();window.scrollTo({top:0});}
backBtn.addEventListener("click",()=>go(-1));
nextBtn.addEventListener("click",()=>go(1));
document.addEventListener("keydown",e=>{
  if(document.activeElement&&document.activeElement.tagName==="TEXTAREA")return;
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();go(1);}
  if(e.key==="ArrowLeft"){e.preventDefault();go(-1);}
});
render();
</script>
</body>
</html>
